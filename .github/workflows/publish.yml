name: Deploy to Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install TinyTeX (für die Einverstaendnis-PDF)
        run: quarto install tinytex --no-prompt

      - name: Render Einverstaendnis to PDF
        run: |
          set -e
          quarto render materials/einverstaendnis.qmd --to pdf
          # Falls die PDF nicht direkt in materials/ liegt, dorthin verschieben –
          # damit das anschliessende Book-Render sie via resources:-Glob abholt.
          if [ ! -f materials/einverstaendnis.pdf ]; then
            FOUND=$(find . -name "einverstaendnis.pdf" -not -path "./_site/*" | head -n1)
            if [ -n "$FOUND" ]; then
              mv "$FOUND" materials/einverstaendnis.pdf
            else
              echo "ERROR: einverstaendnis.pdf wurde nicht erzeugt." >&2
              find . -name "einverstaendnis.pdf" -ls
              exit 1
            fi
          fi
          ls -la materials/einverstaendnis.pdf

      - name: Render Quarto Book (HTML)
        uses: quarto-dev/quarto-actions/render@v2
        with:
          to: html

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
