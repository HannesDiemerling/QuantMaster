name: Generate seed datasets (manual)

# Wird NUR manuell gestartet (Actions-Tab > "Run workflow"). Kein Auto-Trigger.
# Zweck: Die 10 vorgenerierten Uebungsdatensaetze fuer Tag 1 deterministisch
# erzeugen, damit die Lehrperson sie vor dem Workshop ins Repo committen kann.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R packages
        run: Rscript -e 'install.packages(c("readr", "dplyr", "MASS"))'

      - name: Generate datasets
        run: Rscript scripts/generate-datasets.R

      - name: Commit generated datasets
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(data): regenerate seed datasets"
          file_pattern: |
            data/generated/*.csv
            scripts/error-overview.md
