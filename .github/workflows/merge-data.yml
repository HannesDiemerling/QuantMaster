name: Merge raw CSVs

on:
  push:
    paths:
      - 'data/raw/**.csv'
      - 'data/seed/**.csv'
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'

      - name: Install R packages
        run: |
          install.packages(c("readr", "dplyr", "purrr"), repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - name: Run merge script
        run: Rscript scripts/merge-data.R

      - name: Commit combined dataset
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(data): refresh combined dataset"
          file_pattern: data/combined/*.csv
