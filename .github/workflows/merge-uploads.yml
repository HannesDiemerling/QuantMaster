name: Merge student uploads

on:
  push:
    paths:
      - "data/student-uploads/**.csv"
      - "scripts/merge-uploads.R"
      - ".github/workflows/merge-uploads.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R packages
        run: Rscript -e 'install.packages(c("readr", "dplyr"))'

      - name: Merge uploads
        run: Rscript scripts/merge-uploads.R

      - name: Commit combined dataset
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(data): refresh combined dataset"
          file_pattern: data/combined/*.csv
