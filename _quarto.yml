project:
  type: book
  output-dir: _site
  render:
    - "index.qmd"
    - "tag1/*.qmd"
    - "tag2/*.qmd"
    - "tag3/*.qmd"
    - "materials/codebook.qmd"
  resources:
    - "materials/*.pdf"
    - "materials/*.csv"

book:
  title: "M15 — Quantitative Forschungsmethoden"
  subtitle: "Workshop HMU Potsdam — Mai/Juni 2026"
  author: "Prof. Dr. Daniel Schad"
  date: "2026-05"
  repo-url: https://github.com/hannesdiemerling/QuantMaster
  repo-actions: [edit, issue]
  search: true
  page-navigation: true
  sidebar:
    style: docked
    collapse-level: 1
  chapters:
    - index.qmd
    - part: "Tag 1 — 21.05.2026 · Technisches Setup & Datenerhebung"
      chapters:
        - tag1/00-uebersicht.qmd
        - tag1/01-open-science.qmd
        - tag1/02-forschungsethik.qmd
        - tag1/03-messtheorie-bfi-k.qmd
        - tag1/04-fragebogen-ausfuellen.qmd
        - tag1/05-github-einstieg.qmd
        - tag1/06-datensatz-laden.qmd
        - tag1/07-datenbereinigung-jasp.qmd
        - tag1/08-hochladen-kombinieren.qmd
        - tag1/09-tagesabschluss.qmd
    - part: "Tag 2 — 28.05.2026 · Datensatz verstehen & deskriptiv analysieren"
      chapters:
        - tag2/00-uebersicht.qmd
    - part: "Tag 3 — 04.06.2026 · Multivariate Verfahren"
      chapters:
        - tag3/00-uebersicht.qmd
    - part: "Referenz"
      chapters:
        - materials/codebook.qmd

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    toc-depth: 3
    number-sections: true
    code-copy: true
    code-overflow: wrap
    callout-appearance: default
    fig-responsive: true
    link-external-newwindow: true

execute:
  freeze: auto
  echo: true
  warning: false

lang: de
